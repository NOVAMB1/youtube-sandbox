    - name: Generate Jupyter Notebook
      run: |
        SEARCH="${{ github.event.inputs.search_query }}"
        RANDOM_NAME="search_$(date +%s).ipynb"
        GITHUB_USER="${{ github.repository_owner }}"
        REPO_NAME="${{ github.event.repository.name }}"
        
        python3 << EOF
        import json, os, glob
        
        search_query = "${{ github.event.inputs.search_query }}"
        random_name = "${{ steps.random.outputs.filename }}"
        github_user = "${{ github.repository_owner }}"
        repo_name = "${{ github.event.repository.name }}"
        notebook_file = f"YouTube Search/{RANDOM_NAME}"
        
        with open('YouTube Search/results.json') as f:
            results = [json.loads(l) for l in f]
        
        # حذف فایل‌های قدیمی
        for old in glob.glob('YouTube Search/*.ipynb'):
            if old != notebook_file:
                try: os.remove(old)
                except: pass
        
        # ساخت سلول‌های Notebook
        cells = []
        
        # سلول عنوان
        cells.append({
            "cell_type": "markdown",
            "metadata": {},
            "source": [f"# 🎬 YouTube Search: {search_query}\\n\\n**{len(results)} نتیجه**\\n"]
        })
        
        # سلول برای هر ویدیو
        for v in results:
            vid = v.get('id', '')
            title = v.get('title', 'بدون عنوان')
            channel = v.get('channel', 'نامشخص')
            url = v.get('webpage_url', '')
            views = v.get('view_count', 0)
            duration = v.get('duration', 0)
            
            if views >= 1000000:
                views_txt = f"{views/1000000:.1f}M"
            elif views >= 1000:
                views_txt = f"{views/1000:.1f}K"
            else:
                views_txt = str(views)
            
            if duration:
                minutes = duration // 60
                seconds = duration % 60
                dur_txt = f"{minutes}:{seconds:02d}"
            else:
                dur_txt = "?"
            
            # لینک دایرکت عکس
            thumb_url = f"https://raw.githubusercontent.com/{github_user}/{repo_name}/refs/heads/main/thumbnails/{vid}.jpg"
            
            markdown = f"""
<div style="display: flex; margin-bottom: 30px; border-bottom: 1px solid #ccc; padding-bottom: 20px;">
    <img src="{thumb_url}" width="240" style="border-radius: 10px; margin-left: 20px;" onerror="this.src='https://placehold.co/240x135'">
    <div>
        <h3>{title}</h3>
        <p><strong>{channel}</strong><br>
        👁️ {views_txt} بازدید • ⏱️ {dur_txt}</p>
        <p>🔗 <a href="{url}" target="_blank">{url}</a></p>
    </div>
</div>
"""
            
            cells.append({
                "cell_type": "markdown",
                "metadata": {},
                "source": [markdown]
            })
        
        # ساخت فایل Notebook
        notebook = {
            "cells": cells,
            "metadata": {
                "kernelspec": {
                    "display_name": "Python 3",
                    "language": "python",
                    "name": "python3"
                },
                "language_info": {
                    "name": "python",
                    "version": "3.11.0"
                }
            },
            "nbformat": 4,
            "nbformat_minor": 5
        }
        
        with open(notebook_file, 'w', encoding='utf-8') as f:
            json.dump(notebook, f, ensure_ascii=False, indent=1)
        
        with open('YouTube Search/latest.txt', 'w') as f:
            f.write(RANDOM_NAME)
        
        print(f"✅ {RANDOM_NAME}")
        EOF
