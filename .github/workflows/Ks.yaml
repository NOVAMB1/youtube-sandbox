name: YouTube Search

on:
  workflow_dispatch:
    inputs:
      search_query:
        description: '🔍 چی رو سرچ کنم؟'
        required: true
        default: 'eminem'
        type: string
      clear_old:
        description: '🗑 پاک کردن فایل‌های قبلی'
        required: false
        default: true
        type: boolean
      max_results:
        description: '📊 تعداد نتایج'
        required: false
        default: '30'
        type: choice
        options:
          - '10'
          - '20'
          - '30'
          - '40'
          - '50'

permissions:
  contents: write

jobs:
  search:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup yt-dlp
        uses: AnimMouse/setup-yt-dlp@v3
      
      - name: Setup YouTube Cookies
        run: |
          mkdir -p ~/.cache/yt-dlp/youtube
          if [ -n "${{ secrets.YOUTUBE_COOKIES }}" ]; then
            echo "${{ secrets.YOUTUBE_COOKIES }}" > ~/.cache/yt-dlp/youtube/cookies.txt
          fi
      
      - name: Clean old files
        if: github.event.inputs.clear_old == 'true'
        run: |
          rm -rf "YouTube Search" thumbnails
          mkdir -p "YouTube Search" thumbnails
      
      - name: Search and download thumbnails
        run: |
          SEARCH="${{ github.event.inputs.search_query }}"
          MAX="${{ github.event.inputs.max_results }}"
          
          CMD="yt-dlp \"ytsearch${MAX}:${SEARCH}\" --dump-json --skip-download"
          [ -n "${{ secrets.YOUTUBE_COOKIES }}" ] && CMD="$CMD --cookies ~/.cache/yt-dlp/youtube/cookies.txt"
          eval "$CMD > \"YouTube Search/results.json\""
          
          python3 << 'EOF'
          import json, urllib.request, os
          from concurrent.futures import ThreadPoolExecutor
          
          with open('YouTube Search/results.json') as f:
              results = [json.loads(l) for l in f]
          
          def download(v):
              i, v = v
              vid = v.get('id', str(i))
              thumb = v.get('thumbnail', '')
              if thumb:
                  ext = 'webp' if 'webp' in thumb.lower() else 'jpg'
                  try:
                      urllib.request.urlretrieve(thumb, f"thumbnails/{vid}.{ext}")
                  except: pass
          
          with ThreadPoolExecutor(max_workers=10) as ex:
              list(ex.map(download, enumerate(results)))
          EOF
      
      - name: Generate Jupyter Notebook
        run: |
          SEARCH="${{ github.event.inputs.search_query }}"
          RANDOM_NAME="search_$(date +%s).ipynb"
          GITHUB_USER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          
          python3 << EOF
          import json, os
          
          with open('YouTube Search/results.json') as f:
              results = [json.loads(l) for l in f]
          
          # ساخت سلول‌های مارک‌دان برای هر ویدیو
          cells = []
          
          # سلول عنوان
          cells.append({
              "cell_type": "markdown",
              "metadata": {},
              "source": [f"# 🎬 YouTube Search: {SEARCH}\\n\\n**{len(results)} نتیجه**\\n\\n---\\n"]
          })
          
          # سلول برای هر ویدیو
          for v in results:
              vid = v.get('id', '')
              title = v.get('title', 'بدون عنوان')
              channel = v.get('channel', 'نامشخص')
              url = v.get('webpage_url', '')
              views = v.get('view_count', 0)
              
              if views >= 1000000:
                  views_txt = f"{views/1000000:.1f}M"
              elif views >= 1000:
                  views_txt = f"{views/1000:.1f}K"
              else:
                  views_txt = str(views)
              
              # لینک دایرکت عکس
              thumb_url = f"https://raw.githubusercontent.com/{GITHUB_USER}/{REPO_NAME}/refs/heads/main/thumbnails/{vid}.jpg"
              
              markdown = f"""<div style="display: flex; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 20px;">
      <img src="{thumb_url}" width="200" style="border-radius: 10px; margin-left: 20px;" onerror="this.src='https://placehold.co/200x120'">
      <div>
          <h3>{title}</h3>
          <p><strong>{channel}</strong> • 👁️ {views_txt} بازدید</p>
          <p>🔗 <a href="{url}" target="_blank">{url}</a></p>
      </div>
  </div>
  ---
  """
              
              cells.append({
                  "cell_type": "markdown",
                  "metadata": {},
                  "source": [markdown]
              })
          
          # ساخت فایل Notebook
          notebook = {
              "cells": cells,
              "metadata": {
                  "kernelspec": {
                      "display_name": "Python 3",
                      "language": "python",
                      "name": "python3"
                  },
                  "language_info": {
                      "name": "python",
                      "version": "3.11.0"
                  }
              },
              "nbformat": 4,
              "nbformat_minor": 5
          }
          
          with open(f'YouTube Search/{RANDOM_NAME}', 'w', encoding='utf-8') as f:
              json.dump(notebook, f, ensure_ascii=False, indent=1)
          
          with open('YouTube Search/latest.txt', 'w') as f:
              f.write(RANDOM_NAME)
          
          print(f"✅ {RANDOM_NAME}")
          EOF
      
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add YouTube Search/ thumbnails/
          git commit -m "Search: ${{ github.event.inputs.search_query }}" || echo "ok"
          git push
      
      - name: Show link
        run: |
          LATEST=$(cat YouTube Search/latest.txt)
          echo "========================================="
          echo "🔗 https://github.com/${{ github.repository }}/blob/main/YouTube%20Search/${LATEST}"
          echo "========================================="
