name: YouTube Search

on:
  workflow_dispatch:
    inputs:
      search_query:
        description: '🔍 چی رو سرچ کنم؟'
        required: true
        default: 'eminem'
        type: string
      clear_old:
        description: '🗑 پاک کردن کامل فایل‌های قبلی'
        required: false
        default: true
        type: boolean
      max_results:
        description: '📊 تعداد نتایج'
        required: false
        default: '30'
        type: choice
        options:
          - '10'
          - '20'
          - '30'
          - '40'
          - '50'

permissions:
  contents: write

jobs:
  search:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup yt-dlp
        uses: AnimMouse/setup-yt-dlp@v3
      
      - name: Setup YouTube Cookies
        run: |
          mkdir -p ~/.cache/yt-dlp/youtube
          if [ -n "${{ secrets.YOUTUBE_COOKIES }}" ]; then
            echo "${{ secrets.YOUTUBE_COOKIES }}" > ~/.cache/yt-dlp/youtube/cookies.txt
            echo "✅ Cookies installed"
          else
            echo "⚠️ No cookies found"
          fi
      
      - name: Clean old files
        if: github.event.inputs.clear_old == 'true'
        run: |
          rm -rf "YouTube Search" thumbnails
          mkdir -p "YouTube Search" thumbnails
      
      - name: Create directories
        run: |
          mkdir -p "YouTube Search" thumbnails
      
      - name: Search and download thumbnails
        run: |
          SEARCH="${{ github.event.inputs.search_query }}"
          MAX="${{ github.event.inputs.max_results }}"
          
          CMD="yt-dlp \"ytsearch${MAX}:${SEARCH}\" --dump-json --skip-download"
          if [ -n "${{ secrets.YOUTUBE_COOKIES }}" ]; then
            CMD="$CMD --cookies ~/.cache/yt-dlp/youtube/cookies.txt"
          fi
          eval "$CMD > \"YouTube Search/results.json\""
          
          python3 << 'EOF'
          import json, urllib.request, os
          from concurrent.futures import ThreadPoolExecutor
          
          with open('YouTube Search/results.json') as f:
              results = [json.loads(l) for l in f]
          
          def download(v):
              i, v = v
              vid = v.get('id', str(i))
              thumb = v.get('thumbnail', '')
              if thumb:
                  ext = 'webp' if 'webp' in thumb.lower() else 'jpg'
                  try:
                      urllib.request.urlretrieve(thumb, f"thumbnails/{vid}.{ext}")
                  except: pass
          
          with ThreadPoolExecutor(max_workers=10) as ex:
              list(ex.map(download, enumerate(results)))
          EOF
      
      - name: Generate random filename
        id: random
        run: |
          RANDOM_NAME=$(date +%s%N | md5sum | head -c 10)
          echo "filename=${RANDOM_NAME}" >> $GITHUB_OUTPUT
      
      - name: Generate HTML
        run: |
          SEARCH="${{ github.event.inputs.search_query }}"
          RANDOM_NAME="${{ steps.random.outputs.filename }}"
          
          python3 << EOF
          import json, os, glob
          
          search_query = "${{ github.event.inputs.search_query }}"
          random_name = "${{ steps.random.outputs.filename }}"
          html_file = f"YouTube Search/{random_name}.html"
          
          with open('YouTube Search/results.json') as f:
              results = [json.loads(l) for l in f]
          
          for old in glob.glob('YouTube Search/*.html'):
              if old != html_file:
                  try: os.remove(old)
                  except: pass
          
          html = f'''<!DOCTYPE html>
          <html lang="fa" dir="rtl">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>YouTube Search: {search_query}</title>
              <style>
                  *{{margin:0;padding:0;box-sizing:border-box}}
                  body{{background:#0f0f0f;color:#fff;font-family:system-ui;padding:20px}}
                  .header{{background:#202020;padding:15px;border-radius:12px;margin-bottom:25px}}
                  .header h1{{color:#ff0000;font-size:24px}}
                  .grid{{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}}
                  .card{{background:#1a1a1a;border-radius:12px;overflow:hidden}}
                  .card img{{width:100%;aspect-ratio:16/9;object-fit:cover}}
                  .info{{padding:12px}}
                  .title{{font-size:16px;font-weight:500;margin-bottom:8px;color:#fff;text-decoration:none}}
                  .channel{{font-size:13px;color:#aaa;margin-bottom:5px}}
                  .stats{{font-size:12px;color:#888;margin-bottom:10px}}
                  .watch{{display:inline-block;padding:6px 12px;background:#3ea6ff;color:#000;border-radius:18px;font-size:12px;text-decoration:none}}
                  .copy{{display:inline-block;padding:6px 12px;background:#383838;color:#fff;border-radius:18px;font-size:12px;margin-right:8px;cursor:pointer;border:none}}
              </style>
          </head>
          <body>
              <div class="header">
                  <h1>🎬 YouTube Search: {search_query}</h1>
                  <p>📋 {len(results)} نتیجه</p>
              </div>
              <div class="grid">'''
          
          for v in results:
              vid = v.get('id', '')
              title = v.get('title', 'بدون عنوان')[:70]
              channel = v.get('channel', '?')
              url = v.get('webpage_url', '')
              views = v.get('view_count', 0)
              views = f"{views/1000000:.1f}M" if views>=1000000 else f"{views/1000:.1f}K" if views>=1000 else str(views)
              dur = v.get('duration', 0)
              dur = f"{dur//60}:{dur%60:02d}"
              
              thumb_path = f"thumbnails/{vid}.jpg"
              if not os.path.exists(thumb_path):
                  thumb_path = f"thumbnails/{vid}.webp"
              if not os.path.exists(thumb_path):
                  thumb_path = v.get('thumbnail', '')
              
              html += f'''
                  <div class="card">
                      <img src="../{thumb_path}" onerror="this.src='https://placehold.co/320x180'">
                      <div class="info">
                          <a href="{url}" target="_blank" class="title">{title}</a>
                          <div class="channel">{channel}</div>
                          <div class="stats">👁️ {views} • ⏱️ {dur}</div>
                          <div>
                              <a href="{url}" target="_blank" class="watch">▶ تماشا</a>
                              <button class="copy" onclick="copyUrl('{url}')">📋 کپی</button>
                          </div>
                      </div>
                  </div>'''
          
          html += '''
              </div>
              <script>
                  function copyUrl(url) {
                      navigator.clipboard.writeText(url);
                      alert('✅ لینک کپی شد!');
                  }
              </script>
          </body>
          </html>'''
          
          with open(html_file, 'w', encoding='utf-8') as f:
              f.write(html)
          
          with open('YouTube Search/latest.txt', 'w') as f:
              f.write(f"{random_name}.html")
          
          print(f"✅ {len(results)} result | {random_name}.html")
          EOF
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "YouTube Search/" thumbnails/ -f
          git commit -m "🔍 Search: ${{ github.event.inputs.search_query }}" || echo "No changes"
          git push
      
      - name: Show link
        run: |
          echo "========================================="
          echo "https://github.com/${{ github.repository }}/blob/main/YouTube%20Search/${{ steps.random.outputs.filename }}"
          echo "========================================="
