name: حذف فایل‌ها

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: حذف فایل‌های دانلودی
        run: |
          rm -f *.7z.* *.7z *.txt *.mp4 *.zip *.rar
          git add -A
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git commit -m "delete files" || echo "nothing to delete"
          git push
